services:
  - type: web
    name: stockinv-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockinv-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: https://stockinv.vercel.app,http://localhost:3000

databases:
  - name: stockinv-db
    databaseName: stockinv_db
    user: postgres
    plan: free
